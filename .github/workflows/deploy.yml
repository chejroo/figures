name: Deploy to home.pl

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          mkdir dist
          cp -r 404.html favicon.svg images index.html linoskoczek.html robots.txt script.js sitemap.xml styles.css dist/

      - name: Check SFTP reachability
        run: |
          HOST=serwer2691768.hosting-home.pl
          echo "Testing TCP connectivity to $HOST:22 from GitHub's runner IP..."
          if timeout 8 bash -c "echo > /dev/tcp/$HOST/22" 2>/dev/null; then
            echo "Reachable."
          else
            echo "::error::Cannot reach $HOST:22 from this GitHub-hosted runner (Azure IP space). This worked fine over WinSCP from your home network, so it's almost certainly an IP allowlist/firewall on home.pl's side blocking non-whitelisted IPs, not a credentials problem. Check the hosting panel for an SSH/SFTP access-restriction setting."
            exit 1
          fi

      - name: Deploy over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ftpuser1@kuzniafigur.pl
          server: serwer2691768.hosting-home.pl
          port: "22"
          password: ${{ secrets.HOMEPL_SFTP_PASSWORD }}
          local_path: "./dist/*"
          remote_path: "/public_html"
          sftp_only: true
          delete_remote_files: false
